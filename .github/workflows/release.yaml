name: Release Kusari CLI

on:
  workflow_dispatch: # testing only, trigger manually to test it works
  push:
    branches:
      - "*"
    tags:
      - "v*"

permissions:
  actions: read # for detecting the Github Actions environment.
  packages: read # for reading from GHCR

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      image: ${{ steps.hash.outputs.image }}
      digest: ${{ steps.hash.outputs.digest }}
    permissions:
      packages: write # To publish container images to GHCR
      id-token: write # To use our OIDC token
      contents: write # To upload assets to release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Setup ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - name: Build and publish image with ko (non-release)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          ko build ./kusari --bare \
            --platform=linux/amd64,linux/arm64 \
            --tags=latest,sha-${{ github.sha }}

      - name: Build and publish image with ko (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ko build ./kusari --bare \
            --platform=linux/amd64,linux/arm64 \
            --tags=latest,sha-${{ github.sha }},$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]//g')

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # main

      - name: Run GoReleaser Snapshot
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        id: run-goreleaser-snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --snapshot --skip=sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v0.0.0-snapshot-tag
          DOCKER_CONTEXT: default
      - name: Run GoReleaser Release
        if: startsWith(github.ref, 'refs/tags/')
        id: run-goreleaser-release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: 'release --clean'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_CONTEXT: default

      # Generate and upload the image SBOM with kusari-ingest generate mode
      # (MikeBOM, via kusari-cli). Replaces the previous anchore/sbom-action +
      # kusari-ingest file-path pair, and drops the separate cyclonedx-gomod
      # build SBOM. root-name + no-root-purl keep pkg_type empty (matching the
      # prior Syft image rows) so this updates the existing software instead of
      # forking a new `generic` one; root-version uses the release tag, matching
      # the version Syft derived from the image tag.
      - uses: kusaridev/kusari-ingest@c5074276c62f1724efa126e0d4de8cc9aeed3ef9 #v4.6.0
        name: Kusari image SBOM (generate + upload)
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        with:
          generate: true
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          output-path: cyclonedx.sbom.json
          tenant-endpoint: https://kusari.api.us.kusari.cloud
          client-id: ${{ secrets.KUSARI_CLIENT_ID }}
          client-secret: ${{ secrets.KUSARI_CLIENT_SECRET }}
          alias: kusari-cli
          root-name: ghcr.io/${{ github.repository }}
          no-root-purl: true
          root-version: ${{ github.ref_name }}

      - name: Generate hashes and extract image digest
        id: hash
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ARTIFACTS: "${{ steps.run-goreleaser-release.outputs.artifacts }}"
        run: |
          set -euo pipefail

          hashes=$(echo $ARTIFACTS | jq --raw-output '.[] | {name, "digest": (.extra.Digest // .extra.Checksum)} | select(.digest) | {digest} + {name} | join("  ") | sub("^sha256:";"")' | base64 -w0)
          if test "$hashes" = ""; then # goreleaser < v1.13.0
            checksum_file=$(echo "$ARTIFACTS" | jq -r '.[] | select (.type=="Checksum") | .path')
            hashes=$(cat $checksum_file | base64 -w0)
          fi
          echo "hashes=$hashes" >> $GITHUB_OUTPUT

          image=$(echo $ARTIFACTS | jq --raw-output '.[] | select( .type =="Docker Manifest" ).name | split(":")[0]')
          echo "image=$image" >> $GITHUB_OUTPUT
          digest=$(echo $ARTIFACTS | jq --raw-output '.[] | select( .type =="Docker Manifest" ).extra.Digest')
          echo "digest=$digest" >> $GITHUB_OUTPUT

